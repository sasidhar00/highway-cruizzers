<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - {{.Settings.SiteName}}</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            {{if .Settings.LogoURL}}
            <img src="{{.Settings.LogoURL}}" class="h-12 mx-auto">
            {{else}}
            <h1 class="text-3xl font-black" style="color: {{.Settings.PrimaryColor}}">{{.Settings.SiteName}}</h1>
            {{end}}
        </div>
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <div class="text-center mb-6">
                <div class="text-5xl mb-3">🔐</div>
                <h2 class="text-2xl font-bold">Forgot Password?</h2>
                <p class="text-slate-500 text-sm mt-2">Enter your email to reset password</p>
            </div>
            <form hx-post="/forgot-password" hx-target="#result" hx-swap="innerHTML">
                <input type="email" name="email" placeholder="Email Address" required class="w-full px-4 py-3 border rounded-xl mb-4">
                <button type="submit" class="w-full text-white font-semibold py-3 rounded-xl" style="background-color: {{.Settings.PrimaryColor}}">Send Reset Link</button>
            </form>
            <div id="result" class="mt-4"></div>
            <div class="text-center mt-6"><a href="/" class="text-sm" style="color: {{.Settings.PrimaryColor}}">← Back to Home</a></div>
        </div>
    </div>
</body>
</html>
