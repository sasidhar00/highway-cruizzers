<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - {{.Settings.SiteName}}</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            {{if .Settings.LogoURL}}
            <img src="{{.Settings.LogoURL}}" class="h-12 mx-auto">
            {{else}}
            <h1 class="text-3xl font-black" style="color: {{.Settings.PrimaryColor}}">{{.Settings.SiteName}}</h1>
            {{end}}
        </div>
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <div class="text-center mb-6">
                <div class="text-5xl mb-3">🔄</div>
                <h2 class="text-2xl font-bold">Reset Password</h2>
            </div>
            <form hx-post="/reset-password" hx-target="#result" hx-swap="innerHTML">
                <input type="hidden" name="token" value="{{.Token}}">
                <input type="password" name="password" placeholder="New Password (min 8 chars)" required class="w-full px-4 py-3 border rounded-xl mb-4">
                <input type="password" name="confirm_password" placeholder="Confirm Password" required class="w-full px-4 py-3 border rounded-xl mb-4">
                <button type="submit" class="w-full text-white font-semibold py-3 rounded-xl" style="background-color: {{.Settings.PrimaryColor}}">Reset Password</button>
            </form>
            <div id="result" class="mt-4"></div>
        </div>
    </div>
    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
            const pwd = document.querySelector('input[name="password"]').value;
            const confirm = document.querySelector('input[name="confirm_password"]').value;
            if(pwd !== confirm) { e.preventDefault(); document.getElementById('result').innerHTML = '<div class="p-3 bg-red-50 text-red-600 rounded-xl text-center">Passwords do not match!</div>'; }
            else if(pwd.length < 8) { e.preventDefault(); document.getElementById('result').innerHTML = '<div class="p-3 bg-red-50 text-red-600 rounded-xl text-center">Password must be at least 8 characters!</div>'; }
        });
    </script>
</body>
</html>
