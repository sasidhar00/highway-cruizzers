<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biking News - {{.Settings.SiteName}}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
    <div class="max-w-7xl mx-auto p-6">
        <div class="bg-white rounded-2xl shadow-sm p-6 mb-6">
            <div class="flex justify-between items-center">
                <div>
                    {{if .Settings.LogoURL}}
                    <img src="{{.Settings.LogoURL}}" class="h-10 w-auto">
                    {{else}}
                    <h1 class="text-2xl font-black" style="color: {{.Settings.PrimaryColor}}">{{.Settings.SiteName}}</h1>
                    {{end}}
                    <p class="text-slate-500 text-sm">Latest Biking News</p>
                </div>
                <a href="/" class="bg-slate-100 hover:bg-slate-200 px-4 py-2 rounded-full text-sm">← Back</a>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {{range .News}}
            <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
                <div class="h-2" style="background: linear-gradient(90deg, {{$.Settings.PrimaryColor}}, {{$.Settings.SecondaryColor}})"></div>
                <div class="p-5">
                    <span class="text-xs px-2 py-1 rounded-full bg-blue-100">{{.Category}}</span>
                    <h2 class="text-xl font-bold mt-2 mb-2">{{.Title}}</h2>
                    <p class="text-slate-600 text-sm">{{.Content}}</p>
                    <div class="flex justify-between items-center mt-4 pt-3 border-t">
                        <span class="text-xs text-slate-400">{{.Timestamp}}</span>
                        <button onclick="likeNews({{.ID}}, this)" class="flex items-center gap-1 text-slate-400 hover:text-red-500">❤️ <span>{{.Likes}}</span></button>
                    </div>
                </div>
            </div>
            {{else}}
            <div class="col-span-3 text-center py-12">No news available</div>
            {{end}}
        </div>
    </div>

    <script>
        function likeNews(id, btn) {
            fetch('/news/like/'+id,{method:'POST'}).then(res=>res.text()).then(likes=>{btn.querySelector('span').textContent=likes;});
        }
    </script>
</body>
</html>
